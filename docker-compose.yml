services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gemini-chat-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/app
    networks:
      - chat-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: gemini-chat-frontend
    ports:
      - "3000:3000"
    environment:
      - DOCKER_ENV=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - chat-network
    restart: unless-stopped

networks:
  chat-network:
    driver: bridge
